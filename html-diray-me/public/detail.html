<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日记详情</title>
<link rel="stylesheet" href="/css/common.css">
<style>
/* 【功能5】主题CSS变量 */
:root {
  --bg-page: linear-gradient(135deg, #f0f4ff 0%, #e8f0fe 30%, #f5f0ff 60%, #f0faf8 100%);
  --bg-card: rgba(255,255,255,0.92);
  --text-primary: #2d3436;
  --text-secondary: #636e72;
  --text-muted: #b0b8c4;
  --border-color: rgba(0,0,0,0.04);
  --tag-travel-bg: #e67e22;
  --tag-daily-bg: #3498db;
  --tag-mood-bg: #9b59b6;
  --btn-danger: #e74c3c;
  --shadow-card: 0 4px 24px rgba(0,0,0,0.06);
}
[data-theme="dark"] {
  --bg-page: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  --bg-card: rgba(30,30,46,0.92);
  --text-primary: #e0e0e0;
  --text-secondary: #a0a8b4;
  --text-muted: #6a7080;
  --border-color: rgba(255,255,255,0.06);
  --shadow-card: 0 4px 24px rgba(0,0,0,0.25);
}

body, html { margin: 0; padding: 0; min-height: 100%; }
body {
  background: var(--bg-page);
  background-attachment: fixed;
  color: var(--text-primary);
}

/* 【功能1】详情页容器 */
.detail-wrapper {
  max-width: 720px;
  margin: 0 auto;
  padding: 24px 20px 60px;
}

/* 顶部操作栏 */
.detail-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
}
.detail-top .back-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--text-secondary);
  text-decoration: none;
  font-size: 14px;
  padding: 8px 16px;
  border-radius: 12px;
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  transition: all 0.2s ease;
}
.detail-top .back-btn:hover {
  color: var(--text-primary);
  box-shadow: var(--shadow-card);
}
.detail-top .action-btns {
  display: flex;
  gap: 8px;
}
.detail-top .action-btns button {
  padding: 8px 16px;
  border-radius: 12px;
  border: 1px solid var(--border-color);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
  font-family: inherit;
}
.btn-edit {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: #fff;
  border-color: transparent !important;
}
.btn-edit:hover { box-shadow: 0 4px 14px rgba(102,126,234,0.4); }
.btn-delete {
  background: transparent;
  color: var(--btn-danger);
  border-color: rgba(231,76,60,0.3) !important;
}
.btn-delete:hover { background: rgba(231,76,60,0.08); }

/* 【功能4】海报按钮 */
.btn-poster {
  background: transparent;
  color: #e67e22;
  border-color: rgba(230,126,34,0.3) !important;
}
.btn-poster:hover { background: rgba(230,126,34,0.08); }

/* 日记卡片 */
.detail-card {
  background: var(--bg-card);
  border-radius: 24px;
  padding: 36px 32px;
  border: 1px solid var(--border-color);
  box-shadow: var(--shadow-card);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
}

/* 时间 */
.detail-time {
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 14px;
  letter-spacing: 0.3px;
}

/* 标签 */
.detail-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 20px;
}
.diary-tag {
  display: inline-block;
  font-size: 12px;
  font-weight: 600;
  color: #fff;
  padding: 4px 14px;
  border-radius: 10px;
  letter-spacing: 0.3px;
}
.tag-daily { background: var(--tag-daily-bg); }
.tag-travel { background: var(--tag-travel-bg); }
.tag-mood { background: var(--tag-mood-bg); }
.location-tag {
  display: inline-block;
  font-size: 12px;
  font-weight: 600;
  color: #fff;
  background: var(--tag-travel-bg);
  padding: 4px 14px;
  border-radius: 10px;
}

/* 正文 */
.detail-text {
  font-size: 16px;
  line-height: 1.9;
  color: var(--text-primary);
  white-space: pre-wrap;
  word-break: break-word;
  margin-bottom: 28px;
}

/* 图片区域 */
.detail-images {
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.detail-images img {
  width: 100%;
  max-width: 100%;
  height: auto;
  border-radius: 16px;
  cursor: pointer;
  object-fit: contain;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}
.detail-images img:hover {
  transform: scale(1.01);
  box-shadow: 0 8px 32px rgba(0,0,0,0.12);
}

/* 加载状态 */
.detail-loading {
  text-align: center;
  padding: 80px 0;
  color: var(--text-muted);
  font-size: 14px;
}
.detail-error {
  text-align: center;
  padding: 80px 0;
  color: var(--btn-danger);
  font-size: 14px;
}

/* 【功能4】海报弹窗 */
.poster-modal {
  display: none;
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.6);
  z-index: 9998;
  justify-content: center;
  align-items: center;
  backdrop-filter: blur(4px);
}
.poster-modal.show { display: flex; }
.poster-box {
  background: #fff;
  border-radius: 20px;
  padding: 24px;
  max-width: 420px;
  width: 90%;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 16px 48px rgba(0,0,0,0.2);
}
.poster-preview {
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 16px;
}
.poster-preview canvas { width: 100%; height: auto; display: block; }
.poster-templates {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
}
.poster-tpl-btn {
  flex: 1;
  padding: 10px;
  border: 2px solid #eee;
  border-radius: 12px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  text-align: center;
  transition: all 0.2s ease;
  font-family: inherit;
}
.poster-tpl-btn.active { border-color: #667eea; color: #667eea; }
.poster-tpl-btn:hover { border-color: #667eea; }
.poster-actions {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
}
.poster-actions button {
  padding: 10px 24px;
  border-radius: 24px;
  border: none;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s ease;
}
.poster-cancel { background: #f0f1f3; color: #666; }
.poster-cancel:hover { background: #e4e5e8; }
.poster-download {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: #fff;
  box-shadow: 0 2px 10px rgba(102,126,234,0.3);
}
.poster-download:hover { box-shadow: 0 4px 16px rgba(102,126,234,0.45); }

/* 删除确认弹窗 */
.del-modal {
  display: none;
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.5);
  z-index: 9998;
  justify-content: center;
  align-items: center;
}
.del-modal.show { display: flex; }
.del-box {
  background: #fff;
  border-radius: 20px;
  padding: 32px;
  max-width: 380px;
  width: 90%;
  text-align: center;
  box-shadow: 0 16px 48px rgba(0,0,0,0.15);
}
.del-box p { font-size: 15px; color: #555; margin-bottom: 24px; line-height: 1.7; }
.del-btns { display: flex; gap: 10px; justify-content: center; }
.del-btns button {
  padding: 10px 24px;
  border-radius: 24px;
  border: none;
  font-size: 14px;
  cursor: pointer;
  font-family: inherit;
}

/* 移动端适配 */
@media (max-width: 640px) {
  .detail-wrapper { padding: 16px 14px 40px; }
  .detail-card { padding: 24px 18px; border-radius: 18px; }
  .detail-text { font-size: 15px; line-height: 1.8; }
  .detail-top .action-btns { gap: 6px; }
  .detail-top .action-btns button { padding: 7px 12px; font-size: 12px; }
}
</style>
</head>
<body>

<div class="detail-wrapper">
  <div class="detail-top">
    <a href="67zz.html" class="back-btn">← 返回首页</a>
    <div class="action-btns">
      <button class="btn-poster" id="btnPoster">🖼 生成海报</button>
      <button class="btn-edit" id="btnEdit">✏️ 编辑</button>
      <button class="btn-delete" id="btnDelete">🗑 删除</button>
    </div>
  </div>
  <div class="detail-card" id="detailCard">
    <div class="detail-loading"><span class="spinner"></span> 加载中...</div>
  </div>
</div>

<!-- 【功能4】海报弹窗 -->
<div class="poster-modal" id="posterModal">
  <div class="poster-box">
    <div class="poster-preview" id="posterPreview"></div>
    <div class="poster-templates" id="posterTemplates"></div>
    <div class="poster-actions">
      <button class="poster-cancel" id="posterCancel">取消</button>
      <button class="poster-download" id="posterDownload">📥 下载海报</button>
    </div>
  </div>
</div>

<!-- 删除确认弹窗 -->
<div class="del-modal" id="delModal">
  <div class="del-box">
    <p>确定要删除这篇日记吗？<br>删除后可在回收站恢复。</p>
    <div class="del-btns">
      <button style="background:#f0f1f3;color:#666;" id="delCancel">取消</button>
      <button style="background:#e74c3c;color:#fff;" id="delConfirm">删除</button>
    </div>
  </div>
</div>

<!-- 【功能4】html2canvas CDN -->
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="/js/common.js"></script>
<script>
// 【功能5】主题初始化
(function() {
  const theme = localStorage.getItem('theme') || 'light';
  document.documentElement.setAttribute('data-theme', theme);
})();

// 获取URL参数中的日记ID
const urlParams = new URLSearchParams(window.location.search);
const entryId = urlParams.get('id');
let currentEntry = null;

// 加载日记详情
async function loadDetail() {
  if (!entryId) {
    document.getElementById('detailCard').innerHTML = '<div class="detail-error">缺少日记ID参数</div>';
    return;
  }
  try {
    const entry = await apiFetch('/api/entries/' + entryId);
    currentEntry = entry;
    renderDetail(entry);
  } catch (e) {
    document.getElementById('detailCard').innerHTML = '<div class="detail-error">加载失败：' + e.message + '</div>';
  }
}

function renderDetail(e) {
  const card = document.getElementById('detailCard');
  const imgs = e.images || (e.image ? [e.image] : []);

  // 标签
  let tags = '';
  if (e.mode === 'travel') tags += '<span class="diary-tag tag-travel">✈️ 旅游</span>';
  else tags += '<span class="diary-tag tag-daily">🌤 日常</span>';
  if (e.location) tags += '<span class="location-tag">📍 ' + escHtml(e.location) + '</span>';

  // 图片
  let imagesHtml = '';
  if (imgs.length) {
    imagesHtml = '<div class="detail-images">' + imgs.map(img =>
      '<img src="/uploads/' + img + '" onclick="showLightbox(\'/uploads/' + img + '\')" loading="lazy">'
    ).join('') + '</div>';
  }

  card.innerHTML =
    '<div class="detail-time">🕐 ' + formatTime(e.createdAt) + '</div>'
    + '<div class="detail-tags">' + tags + '</div>'
    + (e.text ? '<div class="detail-text">' + escHtml(e.text) + '</div>' : '')
    + imagesHtml;
}

// 编辑按钮 → 跳转diary.html
document.getElementById('btnEdit').addEventListener('click', () => {
  if (currentEntry) window.location.href = 'diary.html';
});

// 删除按钮
document.getElementById('btnDelete').addEventListener('click', () => {
  document.getElementById('delModal').classList.add('show');
});
document.getElementById('delCancel').addEventListener('click', () => {
  document.getElementById('delModal').classList.remove('show');
});
document.getElementById('delModal').addEventListener('click', e => {
  if (e.target === document.getElementById('delModal')) document.getElementById('delModal').classList.remove('show');
});
document.getElementById('delConfirm').addEventListener('click', async () => {
  try {
    await apiFetch('/api/entries/' + entryId, { method: 'DELETE' });
    window.location.href = '67zz.html';
  } catch (e) { alert('删除失败: ' + e.message); }
});

// 【功能4】海报生成
const posterTemplates = [
  { name: '浪漫粉', bg: 'linear-gradient(135deg, #ffecd2, #fcb69f)', text: '#6b3a2a', accent: '#e17055' },
  { name: '清新蓝', bg: 'linear-gradient(135deg, #a1c4fd, #c2e9fb)', text: '#1a3a5c', accent: '#0984e3' },
  { name: '复古橙', bg: 'linear-gradient(135deg, #fddb92, #d1fdff)', text: '#5a3e1b', accent: '#e67e22' }
];
let currentTpl = 0;

document.getElementById('btnPoster').addEventListener('click', () => {
  if (!currentEntry) return;
  document.getElementById('posterModal').classList.add('show');
  renderPosterTemplates();
  renderPosterPreview();
});

document.getElementById('posterCancel').addEventListener('click', () => {
  document.getElementById('posterModal').classList.remove('show');
});
document.getElementById('posterModal').addEventListener('click', e => {
  if (e.target === document.getElementById('posterModal')) document.getElementById('posterModal').classList.remove('show');
});

function renderPosterTemplates() {
  const container = document.getElementById('posterTemplates');
  container.innerHTML = posterTemplates.map((t, i) =>
    '<button class="poster-tpl-btn' + (i === currentTpl ? ' active' : '') + '" data-idx="' + i + '">' + t.name + '</button>'
  ).join('');
  container.querySelectorAll('.poster-tpl-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      currentTpl = parseInt(btn.dataset.idx);
      renderPosterTemplates();
      renderPosterPreview();
    });
  });
}

function renderPosterPreview() {
  if (!currentEntry) return;
  const tpl = posterTemplates[currentTpl];
  const e = currentEntry;
  const date = formatTime(e.createdAt);
  const text = (e.text || '').slice(0, 80) + ((e.text || '').length > 80 ? '...' : '');
  const imgs = e.images || [];
  const imgSrc = imgs.length ? '/uploads/' + imgs[0] : '';

  const div = document.createElement('div');
  div.style.cssText = 'width:380px;padding:32px 28px;background:' + tpl.bg + ';border-radius:16px;font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;';
  div.innerHTML =
    '<div style="font-size:12px;color:' + tpl.accent + ';font-weight:600;margin-bottom:10px;">' + (e.mode === 'travel' ? '✈️ 旅游' : '🌤 日常') + (e.location ? ' · ' + e.location : '') + '</div>'
    + '<div style="font-size:13px;color:' + tpl.text + ';opacity:0.6;margin-bottom:16px;">' + date + '</div>'
    + (imgSrc ? '<img src="' + imgSrc + '" style="width:100%;border-radius:12px;margin-bottom:16px;max-height:200px;object-fit:cover;" crossorigin="anonymous">' : '')
    + '<div style="font-size:14px;line-height:1.8;color:' + tpl.text + ';margin-bottom:24px;">' + escHtml(text) + '</div>'
    + '<div style="text-align:right;font-size:11px;color:' + tpl.text + ';opacity:0.5;">记录生活</div>';

  const preview = document.getElementById('posterPreview');
  preview.innerHTML = '';
  preview.appendChild(div);
}

document.getElementById('posterDownload').addEventListener('click', async () => {
  const preview = document.getElementById('posterPreview').firstElementChild;
  if (!preview) return;
  try {
    const canvas = await html2canvas(preview, { useCORS: true, scale: 2 });
    const link = document.createElement('a');
    link.download = '回忆海报-' + formatTime(currentEntry.createdAt).replace(/[: ]/g, '-') + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  } catch (e) { alert('海报生成失败: ' + e.message); }
});

// 初始化
loadDetail();
</script>
</body>
</html>
