<!DOCTYPE html>
<html lang="zh">
<head>
    <title>记录</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/common.css">
    <style>
        /* ===== 背景层 ===== */
        body, html { height: 100%; }
        .bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('/picture1/2.jpg');
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            z-index: 0;
        }
        /* 柔和渐变遮罩，弱化背景干扰 */
        .bg::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg,
                rgba(232,234,246,0.35) 0%,
                rgba(243,229,245,0.3) 50%,
                rgba(252,228,236,0.25) 100%);
            pointer-events: none;
        }

        /* ===== 居中容器 ===== */
        .login-page {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* ===== 装饰标题（弱化，不遮挡卡片） ===== */
        .login-bg-title {
            position: fixed;
            top: 8%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1;
            font-size: 1.8em;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 4px;
            text-shadow: 0 2px 16px rgba(0, 0, 0, 0.1);
            pointer-events: none;
            white-space: nowrap;
        }

        /* ===== 登录卡片 ===== */
        .login-card {
            position: relative;
            z-index: 10;
            width: 360px;
            max-width: 90vw;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(24px) saturate(1.2);
            -webkit-backdrop-filter: blur(24px) saturate(1.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
            padding: 44px 36px 40px;
            box-shadow:
                0 12px 40px rgba(0, 0, 0, 0.08),
                inset 0 1px 0 rgba(255, 255, 255, 0.4);
            animation: fadeInUp 0.6s ease;
        }

        /* 标题 */
        .login-title {
            text-align: center;
            font-size: 20px;
            font-weight: 600;
            color: #2d3436;
            margin-bottom: 36px;
            letter-spacing: 1px;
        }

        /* 表单组：label 与 input 分行，左对齐 */
        .form-group {
            margin-bottom: 22px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #636e72;
            margin-bottom: 8px;
            letter-spacing: 0.3px;
        }
        .form-group input {
            width: 100%;
            padding: 11px 14px;
            border: 1.5px solid rgba(0, 0, 0, 0.06);
            border-radius: 12px;
            font-size: 15px;
            font-family: inherit;
            outline: none;
            background: rgba(255, 255, 255, 0.45);
            box-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.04);
            transition: border-color 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
        }
        .form-group input:focus {
            border-color: #667eea;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.04), 0 0 0 3px rgba(102, 126, 234, 0.12);
            background: rgba(255, 255, 255, 0.7);
        }
        .form-group input::placeholder {
            color: #b2bec3;
        }

        /* 登录按钮 */
        .login-btn {
            display: block;
            width: 60%;
            margin: 32px auto 0;
            padding: 12px 0;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border: none;
            border-radius: 24px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 2px 12px rgba(102, 126, 234, 0.3);
            letter-spacing: 1px;
        }
        .login-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }
        .login-btn:active {
            transform: translateY(0);
        }
        .login-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* 错误提示 */
        .error-msg {
            color: #e74c3c;
            font-size: 13px;
            text-align: center;
            margin-top: 14px;
            min-height: 20px;
        }

        /* ===== 移动端适配 ===== */
        @media (max-width: 420px) {
            .login-card { padding: 32px 24px; }
            .login-bg-title { font-size: 1.4em; top: 6%; }
        }
    </style>
</head>
<body>

<!-- 背景层 z-index:0 -->
<div class="bg"></div>

<!-- 装饰标题 z-index:1 -->
<div class="login-bg-title">记录的小作品</div>

<!-- 登录卡片 z-index:10，完全居中 -->
<div class="login-page">
    <div class="login-card">
        <h2 class="login-title">请按提示输入</h2>
        <form id="loginForm">
            <div class="form-group">
                <label for="username">账号：</label>
                <input type="text" id="username" placeholder="请输入账号" required>
            </div>
            <div class="form-group">
                <label for="password">密码：</label>
                <input type="password" id="password" placeholder="请输入密码" required>
            </div>
            <button type="button" class="login-btn" id="btnLogin">登录</button>
        </form>
        <div class="error-msg" id="errorMsg"></div>
    </div>
</div>

<script>
    // 如果已登录，直接跳转
    fetch('/api/check-auth').then(r => r.json()).then(d => {
        if (d.authenticated) window.location.href = '67zz.html';
    });

    const btn = document.getElementById('btnLogin');
    const errorMsg = document.getElementById('errorMsg');

    document.getElementById('loginForm').addEventListener('keypress', e => {
        if (e.key === 'Enter') { e.preventDefault(); doLogin(); }
    });
    btn.addEventListener('click', doLogin);

    async function doLogin() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        if (!username || !password) {
            errorMsg.textContent = '请输入账号和密码';
            return;
        }
        btn.disabled = true;
        btn.textContent = '登录中...';
        errorMsg.textContent = '';
        try {
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            if (res.ok) {
                window.location.href = '67zz.html';
            } else {
                errorMsg.textContent = data.error || '登录失败';
            }
        } catch (e) {
            errorMsg.textContent = '网络错误，请重试';
        } finally {
            btn.disabled = false;
            btn.textContent = '登录';
        }
    }
</script>
</body>
</html>
