<!DOCTYPE html>
<html lang="zh">
<head>
    <title>记录</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body, html { height: 100%; margin: 0; font-family: Arial, sans-serif; }
        .bg {
            background-image: url('picture1/2.jpg');
            height: 100%;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-30px); }
            60% { transform: translateY(-15px); }
        }
        .bouncing-text { font-size: 24px; animation: bounce 2s infinite; }
        .title-container {
            position: absolute; top: 20%; left: 50%;
            transform: translate(-50%, -50%);
            color: black; font-size: 2em; text-align: center; width: 100%;
        }
        .login-container {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(255,255,255,0.3);
            padding: 20px; border-radius: 5px; text-align: center;
        }
    </style>
</head>
<body class="bg">
<div class="title-container">
    <h1>记录的小作品</h1>
</div>
<div class="login-container">
    <h2 class="bouncing-text">请按提示输入</h2>
    <form id="loginForm">
        账号（姓氏）：<input type="text" id="username" required><br><br>
        密码（Your love）：<input type="password" id="password" required><br><br>
        <input type="button" value="登录" onclick="login()">
    </form>
</div>
<script>
    document.getElementById('loginForm').addEventListener('keypress', e => {
        if (e.key === 'Enter') { e.preventDefault(); login(); }
    });
    function login() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        if (u === 'zhou' && p === '123456') {
            window.location.href = 'diary.html';
        } else {
            alert('账号或密码错误！');
        }
    }
</script>
</body>
</html>
